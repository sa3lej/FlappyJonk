<svg width="1024" height="1024" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#79c4ff"/>
      <stop offset="1" stop-color="#3d8fdd"/>
    </linearGradient>
    <linearGradient id="can" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8eaee"/>
      <stop offset="0.4" stop-color="#f4b81f"/>
      <stop offset="0.72" stop-color="#f4b81f"/>
      <stop offset="1" stop-color="#e8eaee"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#sky)"/>
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="24" cy="26" rx="13" ry="6"/>
    <ellipse cx="104" cy="20" rx="10" ry="5"/>
  </g>
  <!-- LEGO Jonk head brick -->
  <g>
    <!-- studs -->
    <rect x="42" y="20" width="12" height="8" rx="2" fill="#d9b98c"/>
    <rect x="62" y="20" width="12" height="8" rx="2" fill="#d9b98c"/>
    <!-- head brick -->
    <rect x="30" y="27" width="56" height="66" rx="4" fill="#e3c295"/>
    <!-- mustache -->
    <rect x="43" y="72" width="30" height="7" rx="2" fill="#54301a"/>
    <!-- beard plate + mouth slot -->
    <rect x="34" y="78" width="48" height="18" rx="3" fill="#7a4423"/>
    <rect x="50" y="82" width="16" height="4" rx="2" fill="#211d1b"/>
    <!-- jaw wrap (wider than head) + chin step -->
    <rect x="27" y="90" width="62" height="13" rx="3" fill="#7a4423"/>
    <rect x="42" y="103" width="32" height="9" rx="3" fill="#54301a"/>
    <!-- eyes: round black tiles with highlight -->
    <circle cx="46" cy="52" r="7.5" fill="#141414"/>
    <circle cx="70" cy="52" r="7.5" fill="#141414"/>
    <rect x="42" y="47" width="4" height="4" fill="#ffffff"/>
    <rect x="66" y="47" width="4" height="4" fill="#ffffff"/>
    <!-- oversized square glasses -->
    <g fill="none" stroke="#111111" stroke-width="5.5" stroke-linejoin="round">
      <rect x="34" y="40" width="24" height="24" rx="2"/>
      <rect x="58" y="40" width="24" height="24" rx="2"/>
    </g>
    <rect x="55" y="43" width="6" height="5" fill="#111111"/>
  </g>
  <!-- beer can -->
  <g transform="rotate(14 106 104)">
    <rect x="96" y="90" width="16" height="25" rx="4" fill="url(#can)"/>
    <rect x="96" y="90" width="16" height="6" rx="3" fill="#c9ccd2"/>
  </g>
</svg>
